openapi: 3.0.0
info:
  title: LiveReview API
  version: 1.0.0
servers:
  - url: http://localhost:8888
paths:
  /api/v1/connectors/trigger-review:
    post:
      description: >-
        TriggerReviewV2 handles the request to trigger a code review using the
        new decoupled architecture
      operationId: TriggerReviewV2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.TriggerReviewRequest'
      responses:
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal Server Error
      tags:
        - Connectors
  /api/v1/diff-review:
    post:
      description: >-
        DiffReview accepts a base64-encoded ZIP containing a unified diff and
        triggers a review.
      operationId: DiffReview
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.DiffReviewRequest'
      responses: null
      tags:
        - Diff-Review
  /api/v1/reviews:
    get:
      description: getReviews handles GET /api/v1/reviews with filtering and pagination
      operationId: getReviews
      parameters:
        - in: query
          name: page
          required: true
          schema:
            type: string
        - in: query
          name: per_page
          required: true
          schema:
            type: string
        - in: query
          name: status
          required: true
          schema:
            type: string
        - in: query
          name: provider
          required: true
          schema:
            type: string
        - in: query
          name: search
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ReviewsListResponse'
          description: OK
      tags:
        - Reviews
  /api/v1/reviews/{id}:
    get:
      description: getReviewByID handles GET /api/v1/reviews/:id
      operationId: getReviewByID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ReviewResponse'
          description: OK
      tags:
        - Reviews
