components: {}
info:
  title: LiveReview API
  version: 1.0.0
openapi: 3.0.0
paths:
  /api/v1/activities:
    get:
      description: GetRecentActivities handles the API endpoint for fetching recent activities
      operationId: GetRecentActivities
      parameters:
        - in: query
          name: limit
          required: true
          schema:
            type: string
        - in: query
          name: offset
          required: true
          schema:
            type: string
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Activities
  /api/v1/admin/analytics/users:
    get:
      description: GetUserAnalytics handles getting user analytics (super admin only)
      operationId: GetUserAnalytics
      responses:
        "200":
          description: OK
      tags:
        - Admin
  /api/v1/admin/billing/portfolio/orgs:
    get:
      operationId: ListAdminBillingPortfolioOrganizations
      responses: null
      tags:
        - Admin
  /api/v1/admin/billing/portfolio/orgs/{org_id}/members:
    get:
      operationId: GetAdminOrganizationBillingMembers
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Admin
  /api/v1/admin/billing/portfolio/orgs/{org_id}/usage:
    get:
      operationId: GetAdminOrganizationBillingUsage
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Admin
  /api/v1/admin/billing/portfolio/summary:
    get:
      operationId: GetAdminBillingPortfolioSummary
      responses: null
      tags:
        - Admin
  /api/v1/admin/organizations/{org_id}:
    delete:
      description: DeactivateOrganization soft-deletes an organization (super admin only)
      operationId: DeactivateOrganization
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            format: int64
            type: integer
      responses: null
      tags:
        - Admin
  /api/v1/admin/orgs/{org_id}/users:
    post:
      description: CreateUserInAnyOrg handles creating a user in any organization (super admin only)
      operationId: CreateUserInAnyOrg
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created
      tags:
        - Admin
  /api/v1/admin/users:
    get:
      description: ListAllUsers handles listing all users across all organizations (super admin only)
      operationId: ListAllUsers
      parameters:
        - in: query
          name: offset
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Admin
  /api/v1/admin/users/{user_id}/org:
    put:
      description: TransferUserToOrg handles transferring a user to a different organization (super admin only)
      operationId: TransferUserToOrg
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
      tags:
        - Admin
  /api/v1/aiconnectors:
    get:
      description: GetAIConnectors handles requests to get all AI connectors
      operationId: GetAIConnectors
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Aiconnectors
    post:
      description: CreateAIConnector handles requests to create a new AI connector
      operationId: CreateAIConnector
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Aiconnectors
  /api/v1/aiconnectors/{id}:
    delete:
      description: DeleteAIConnector handles requests to delete an AI connector by ID
      operationId: DeleteAIConnector
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      tags:
        - Aiconnectors
    put:
      description: UpdateAIConnector handles requests to update an existing AI connector
      operationId: UpdateAIConnector
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      tags:
        - Aiconnectors
  /api/v1/aiconnectors/ollama/models:
    post:
      description: FetchOllamaModels handles requests to fetch available models from an Ollama instance
      operationId: FetchOllamaModels
      responses:
        "400":
          description: Bad Request
      tags:
        - Aiconnectors
  /api/v1/aiconnectors/reorder:
    put:
      description: ReorderAIConnectors handles requests to reorder AI connectors
      operationId: ReorderAIConnectors
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Aiconnectors
  /api/v1/aiconnectors/validate-key:
    post:
      description: ValidateAIConnectorKey handles requests to validate an AI provider API key
      operationId: ValidateAIConnectorKey
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Aiconnectors
  /api/v1/auth/change-password:
    post:
      description: ChangePassword handles changing the current user's password
      operationId: ChangePassword
      responses:
        "200":
          description: OK
      tags:
        - Auth
  /api/v1/auth/ensure-cloud-user:
    post:
      description: |-
        EnsureCloudUser ensures that a user and a personal organization exist, assigning super_admin role.
        Idempotent: if user/org/role mapping already exist, it returns success without changes.
      operationId: EnsureCloudUser
      responses:
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      tags:
        - Auth
  /api/v1/auth/login:
    post:
      description: Login handles user authentication with email/password
      operationId: Login
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      tags:
        - Auth
  /api/v1/auth/logout:
    post:
      description: Logout handles user logout (revokes tokens)
      operationId: Logout
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      tags:
        - Auth
  /api/v1/auth/mcp/complete:
    post:
      description: |-
        CompleteMCPAuth is called by the UI after successful login
        This route should be protected by RequireAuth middleware
      operationId: CompleteMCPAuth
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
      tags:
        - Auth
  /api/v1/auth/mcp/initiate:
    post:
      description: InitiateMCPAuth creates a new pending auth request
      operationId: InitiateMCPAuth
      responses:
        "200":
          description: OK
      tags:
        - Auth
  /api/v1/auth/mcp/poll/{request_id}:
    get:
      description: PollMCPAuth allows the MCP server to check for completion
      operationId: PollMCPAuth
      parameters:
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "202":
          description: Accepted
      tags:
        - Auth
  /api/v1/auth/me:
    get:
      description: Me returns information about the currently authenticated user
      operationId: Me
      responses:
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      tags:
        - Auth
  /api/v1/auth/refresh:
    post:
      description: RefreshToken handles token refresh using a valid refresh token
      operationId: RefreshToken
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
      tags:
        - Auth
  /api/v1/auth/setup:
    post:
      description: SetupAdmin handles initial admin user setup (replaces legacy password system)
      operationId: SetupAdmin
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Auth
  /api/v1/auth/setup-status:
    get:
      description: CheckSetupStatus checks if initial setup is needed
      operationId: CheckSetupStatus
      responses:
        "500":
          description: Internal Server Error
      tags:
        - Auth
  /api/v1/billing/downgrade/cancel:
    post:
      operationId: CancelScheduledDowngrade
      responses: null
      tags:
        - Billing
  /api/v1/billing/downgrade/schedule:
    post:
      operationId: ScheduleDowngrade
      responses: null
      tags:
        - Billing
  /api/v1/billing/status:
    get:
      operationId: GetBillingStatus
      responses: null
      tags:
        - Billing
  /api/v1/billing/upgrade:
    post:
      operationId: UpgradePlan
      responses: null
      tags:
        - Billing
  /api/v1/billing/upgrade/execute:
    post:
      operationId: ExecuteUpgrade
      responses: null
      tags:
        - Billing
  /api/v1/billing/upgrade/prepare-payment:
    post:
      operationId: PrepareUpgradePayment
      responses: null
      tags:
        - Billing
  /api/v1/billing/upgrade/preview:
    post:
      operationId: PreviewUpgrade
      responses: null
      tags:
        - Billing
  /api/v1/billing/upgrade/request-status:
    get:
      operationId: GetUpgradeRequestStatus
      parameters:
        - in: query
          name: upgrade_request_id
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Billing
  /api/v1/billing/usage/me:
    get:
      operationId: GetMyUsage
      responses: null
      tags:
        - Billing
  /api/v1/billing/usage/members:
    get:
      operationId: GetUsageMembers
      responses: null
      tags:
        - Billing
  /api/v1/billing/usage/members/{member_id}/operations:
    get:
      operationId: GetMemberUsageOperations
      parameters:
        - in: path
          name: member_id
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Billing
  /api/v1/billing/usage/operations:
    get:
      operationId: GetUsageOperations
      responses: null
      tags:
        - Billing
  /api/v1/billing/usage/summary:
    get:
      operationId: GetUsageSummary
      responses: null
      tags:
        - Billing
  /api/v1/bitbucket-hook/{connector_id}:
    post:
      description: WebhookOrchestratorV2Handler handles webhooks using the V2 orchestrator (full processing pipeline)
      operationId: WebhookOrchestratorV2Handler
      parameters:
        - in: path
          name: connector_id
          required: true
          schema:
            type: string
      responses:
        "500":
          description: Internal Server Error
      tags:
        - Bitbucket-Hook
  /api/v1/bitbucket/validate-profile:
    post:
      description: ValidateBitbucketProfile validates Bitbucket API Token by fetching user profile
      operationId: ValidateBitbucketProfile
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
      tags:
        - Bitbucket
  /api/v1/connectors:
    get:
      description: GetConnectors returns all integration tokens (connectors) for the current organization
      operationId: GetConnectors
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Connectors
  /api/v1/connectors/{connectorId}/disable-manual-trigger:
    post:
      description: DisableManualTriggerForAllProjects handles disabling manual trigger for all projects for a connector
      operationId: DisableManualTriggerForAllProjects
      parameters:
        - in: path
          name: connectorId
          required: true
          schema:
            type: string
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Connectors
  /api/v1/connectors/{connectorId}/enable-manual-trigger:
    post:
      description: EnableManualTriggerForAllProjects handles enabling manual trigger for all projects for a connector
      operationId: EnableManualTriggerForAllProjects
      parameters:
        - in: path
          name: connectorId
          required: true
          schema:
            type: string
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Connectors
  /api/v1/connectors/{connectorId}/repository-access:
    get:
      description: |-
        GetRepositoryAccess fetches repository access information for a connector
        Query Parameters:
          - refresh: Set to "true" to force refresh the cached data (optional)
        //
        Example usage:
          - GET /api/repository-access/{connectorId} - Returns cached data if available
          - GET /api/repository-access/{connectorId}?refresh=true - Forces fresh data fetch and updates cache
      operationId: GetRepositoryAccess
      parameters:
        - in: path
          name: connectorId
          required: true
          schema:
            type: string
        - in: query
          name: refresh
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      tags:
        - Connectors
  /api/v1/connectors/{id}:
    delete:
      description: DeleteConnector handles deletion of a git provider connection
      operationId: DeleteConnector
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      tags:
        - Connectors
    get:
      description: GetConnector handles fetching a single git provider connection by ID
      operationId: GetConnector
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      tags:
        - Connectors
  /api/v1/connectors/trigger-review:
    post:
      description: TriggerReviewV2 handles the request to trigger a code review using the new decoupled architecture
      operationId: TriggerReviewV2
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Connectors
  /api/v1/dashboard:
    get:
      description: GetDashboardData retrieves the cached dashboard data
      operationId: GetDashboardData
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Dashboard
  /api/v1/dashboard/refresh:
    post:
      description: RefreshDashboardData manually triggers a dashboard data update
      operationId: RefreshDashboardData
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Dashboard
  /api/v1/diff-review:
    post:
      description: DiffReview accepts a base64-encoded ZIP containing a unified diff and triggers a review.
      operationId: DiffReview
      responses: null
      tags:
        - Diff-Review
  /api/v1/diff-review/{id}/events:
    get:
      description: GetReviewEvents handles GET /api/v1/reviews/{id}/events (polling endpoint)
      operationId: GetReviewEvents
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: since
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Diff-Review
  /api/v1/diff-review/{id}/events/{type}:
    get:
      description: GetReviewEventsByType handles GET /api/v1/reviews/{id}/events/{type}
      operationId: GetReviewEventsByType
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Diff-Review
  /api/v1/diff-review/{id}/summary:
    get:
      description: GetReviewSummary handles GET /api/v1/reviews/{id}/summary
      operationId: GetReviewSummary
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
      tags:
        - Diff-Review
  /api/v1/diff-review/{review_id}:
    get:
      description: GetDiffReviewStatus returns processing status or completed results for a diff review.
      operationId: GetDiffReviewStatus
      parameters:
        - in: path
          name: review_id
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Diff-Review
  /api/v1/diff-review/cli-used:
    post:
      description: TrackCLIUsage updates the last_cli_used_at timestamp for a user
      operationId: TrackCLIUsage
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      tags:
        - Diff-Review
  /api/v1/diff-review/trigger-local-review:
    get:
      description: TriggerLocalReview returns instructions for the AI agent on how to trigger a local review via the terminal.
      operationId: TriggerLocalReview
      responses:
        "200":
          description: OK
      tags:
        - Diff-Review
  /api/v1/feedback:
    post:
      operationId: SubmitFeedback
      responses:
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      tags:
        - Feedback
  /api/v1/feedback/{id}/retract:
    patch:
      operationId: RetractFeedback
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: int64
            type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      tags:
        - Feedback
  /api/v1/feedback/impact-stats:
    get:
      description: ImpactStats returns org-scoped review quality stats for the authenticated user's org.
      operationId: ImpactStats
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
      tags:
        - Feedback
  /api/v1/gitea-hook/{connector_id}:
    post:
      description: WebhookOrchestratorV2Handler handles webhooks using the V2 orchestrator (full processing pipeline)
      operationId: WebhookOrchestratorV2Handler
      parameters:
        - in: path
          name: connector_id
          required: true
          schema:
            type: string
      responses:
        "500":
          description: Internal Server Error
      tags:
        - Gitea-Hook
  /api/v1/gitea/validate-profile:
    post:
      description: ValidateGiteaProfile validates Gitea PAT + base URL by fetching user profile
      operationId: ValidateGiteaProfile
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
      tags:
        - Gitea
  /api/v1/github-hook/{connector_id}:
    post:
      description: WebhookOrchestratorV2Handler handles webhooks using the V2 orchestrator (full processing pipeline)
      operationId: WebhookOrchestratorV2Handler
      parameters:
        - in: path
          name: connector_id
          required: true
          schema:
            type: string
      responses:
        "500":
          description: Internal Server Error
      tags:
        - Github-Hook
  /api/v1/github/validate-profile:
    post:
      description: ValidateGitHubProfile validates GitHub PAT by fetching user profile
      operationId: ValidateGitHubProfile
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
      tags:
        - Github
  /api/v1/gitlab-hook/{connector_id}:
    post:
      description: WebhookOrchestratorV2Handler handles webhooks using the V2 orchestrator (full processing pipeline)
      operationId: WebhookOrchestratorV2Handler
      parameters:
        - in: path
          name: connector_id
          required: true
          schema:
            type: string
      responses:
        "500":
          description: Internal Server Error
      tags:
        - Gitlab-Hook
  /api/v1/gitlab/refresh:
    post:
      description: GitLabRefreshToken refreshes an expired GitLab token via HTTP handler
      operationId: GitLabRefreshToken
      responses:
        "400":
          description: Bad Request
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      tags:
        - Gitlab
  /api/v1/gitlab/token:
    post:
      description: GitLabHandleCodeExchange handles the exchange of authorization code for access token
      operationId: GitLabHandleCodeExchange
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Gitlab
  /api/v1/gitlab/validate-profile:
    post:
      description: ValidateGitLabProfile validates GitLab PAT and base URL by fetching user profile
      operationId: ValidateGitLabProfile
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
      tags:
        - Gitlab
  /api/v1/integration_tokens/pat:
    post:
      description: Handler for creating PAT integration token, delegates to pat_token.go
      operationId: HandleCreatePATIntegrationToken
      responses:
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - Integration_tokens
  /api/v1/learnings:
    get:
      operationId: List
      parameters:
        - in: query
          name: page
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: true
          schema:
            type: string
        - in: query
          name: search
          required: true
          schema:
            type: string
        - in: query
          name: include_archived
          required: true
          schema:
            type: string
      responses: null
      tags:
        - Learnings
    post:
      operationId: Upsert
      responses: null
      tags:
        - Learnings
  /api/v1/learnings/{id}:
    delete:
      operationId: Delete
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
      tags:
        - Learnings
    get:
      operationId: Get
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
      tags:
        - Learnings
    put:
      operationId: Update
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
      tags:
        - Learnings
  /api/v1/learnings/apply-action-from-reply:
    post:
      operationId: ApplyActionFromReply
      responses:
        "200":
          description: OK
      tags:
        - Learnings
  /api/v1/license/delete:
    delete:
      operationId: handleLicenseDelete
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
      tags:
        - License
  /api/v1/license/refresh:
    post:
      operationId: handleLicenseRefresh
      responses:
        "200":
          description: OK
      tags:
        - License
  /api/v1/license/seats:
    get:
      description: handleListSeatAssignments lists all current seat assignments
      operationId: handleListSeatAssignments
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      tags:
        - License
  /api/v1/license/seats/{user_id}:
    delete:
      description: handleRevokeSeat revokes a license seat from a user
      operationId: handleRevokeSeat
